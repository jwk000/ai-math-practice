<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>算式找茬</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="topbar" aria-label="游戏状态">
        <div>
          <p class="eyebrow">四则运算找茬</p>
          <h1>找出那个算错的算式</h1>
        </div>
      </section>

      <nav class="page-tabs" aria-label="练习入口">
        <button id="gameTabButton" class="tab-button active" type="button">随机找茬</button>
        <button id="practiceTabButton" class="tab-button" type="button">专项练习</button>
        <button id="mistakeTabButton" class="tab-button" type="button">错题集</button>
        <button id="leaderboardTabButton" class="tab-button" type="button">排行榜</button>
      </nav>

      <section id="gamePage">
        <section class="score-panel" aria-label="得分">
          <div class="countdown-stat" aria-label="本题剩余时间" aria-live="polite">
            <span class="label">倒计时</span>
            <strong><span id="timeLeft">20</span><small> 秒</small></strong>
          </div>
          <div>
            <span class="label" id="roundLabel">进度</span>
            <strong id="round">1/20</strong>
          </div>
          <div>
            <span class="label">积分</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span class="label">正确</span>
            <strong id="correctCount">0</strong>
          </div>
          <div>
            <span class="label">错误</span>
            <strong id="wrongCount">0</strong>
          </div>
          <div>
            <span class="label">连胜</span>
            <strong id="comboCount">0</strong>
          </div>
          <div>
            <span class="label">模式</span>
            <strong id="modeName">随机</strong>
          </div>
          <button id="newGameButton" type="button">重新开始</button>
        </section>

        <section class="question-panel" aria-live="polite">
          <div class="prompt-row">
            <p id="prompt">请选择错误的算式</p>
            <span id="difficultyTag">基础练习</span>
          </div>
          <div id="choices" class="choices" aria-label="算式选项"></div>
          <div class="question-actions">
            <button id="nextQuestionButton" class="hidden" type="button">下一题</button>
          </div>
        </section>

        <section id="feedback" class="feedback hidden" aria-live="assertive"></section>
        <div id="comboFloat" class="combo-float hidden" aria-live="polite"></div>
      </section>

      <section id="practicePage" class="practice-page hidden" aria-label="专项练习">
        <div class="section-title">
          <div>
            <p class="eyebrow">专项练习</p>
            <h2>选择一种易错类型</h2>
          </div>
          <span>每组 10 题</span>
        </div>
        <div id="practiceCatalog" class="practice-catalog"></div>
      </section>

      <section id="mistakePage" class="mistake-book hidden" aria-label="错题集">
        <div class="section-title">
          <div>
            <p class="eyebrow">错题集</p>
            <h2>按错误原因练一练</h2>
          </div>
          <span id="mistakeCount">0 题</span>
        </div>
        <div id="mistakeGroups" class="mistake-groups"></div>
      </section>

      <section id="leaderboardPage" class="leaderboard-page hidden" aria-label="排行榜">
        <div class="section-title">
          <div>
            <p class="eyebrow">排行榜</p>
            <h2>历史挑战得分</h2>
          </div>
          <span id="leaderboardCount">0 次</span>
        </div>
        <div id="leaderboardList" class="leaderboard-list"></div>
      </section>
    </main>

    <audio id="bgmAudio" src="assets/audio/bgm-flowerbed-fields.ogg" loop preload="auto"></audio>
    <audio id="clickAudio" src="assets/audio/click.mp3" preload="auto"></audio>
    <audio id="correctAudio" src="assets/audio/correct.mp3" preload="auto"></audio>
    <audio id="wrongAudio" src="assets/audio/error.mp3" preload="auto"></audio>
    <audio id="comboWin3Audio" src="assets/audio/win-3.mp3" preload="auto"></audio>
    <audio id="comboWin5Audio" src="assets/audio/win-5.mp3" preload="auto"></audio>
    <audio id="comboWin7Audio" src="assets/audio/win-7.mp3" preload="auto"></audio>
    <audio id="comboWin9Audio" src="assets/audio/win-9.mp3" preload="auto"></audio>
    <audio id="comboWin11Audio" src="assets/audio/win-11.mp3" preload="auto"></audio>
    <script src="script.js"></script>
  </body>
</html>
